<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4X BET FINAL BOSS</title>

<style>
body{
 margin:0;
 font-family:sans-serif;
 background:linear-gradient(135deg,#020617,#000);
 color:white;
}

/* HEADER */
.header{
 display:flex;
 justify-content:space-between;
 padding:12px;
 background:#000;
 box-shadow:0 0 20px cyan;
}

/* SCREENS */
.screen{display:none;}
.active{display:block;}

/* CARD */
.card{
 margin:10px;
 padding:15px;
 border-radius:15px;
 background:#111;
 box-shadow:0 0 20px rgba(0,255,255,0.3);
}

/* BUTTON */
button{
 padding:10px;
 margin:5px;
 border:none;
 border-radius:10px;
 background:#22c55e;
 color:white;
 font-weight:bold;
}

/* SLOT */
#slot{
 font-size:32px;
 letter-spacing:8px;
 transition:0.3s;
}

/* NAV */
.nav{
 position:fixed;
 bottom:0;
 width:100%;
 display:flex;
 justify-content:space-around;
 background:#000;
 padding:10px;
}

/* LIVE */
.live{
 color:lime;
 animation:blink 1s infinite;
}
@keyframes blink{50%{opacity:0.3}}

/* 3D CARD */
.card:hover{
 transform:scale(1.05) rotateX(5deg);
 transition:0.3s;
}
</style>
</head>

<body>

<div class="header">
<div>🎰 4X BET</div>
<div>💰 <span id="coins">1000</span></div>
</div>

<!-- LOGIN -->
<div id="login" class="screen active">
<div class="card">
<h3>👤 Login</h3>
<input id="user" placeholder="Username">
<button onclick="login()">Enter</button>
</div>
</div>

<!-- HOME -->
<div id="home" class="screen">
<div class="card">
<h3>🎮 All Games</h3>
<button onclick="spin()">Slot</button>
<button onclick="dice()">Dice</button>
<button onclick="flip()">Flip</button>
<button onclick="color()">Color</button>
<button onclick="number()">Number</button>
<button onclick="roulette()">Roulette</button>
<button onclick="hiLo()">Hi-Lo</button>
<button onclick="crash()">Crash</button>
<button onclick="mine()">Mines</button>
<button onclick="wheel()">Wheel</button>
</div>
</div>

<!-- SPORTS -->
<div id="sports" class="screen">
<div class="card">
<h3 class="live">⚽ LIVE MATCH</h3>
<p>Nepal vs India (Demo)</p>
<button onclick="bet(1)">Nepal</button>
<button onclick="bet(0)">India</button>
</div>
</div>

<!-- WALLET -->
<div id="wallet" class="screen">
<div class="card">
<h3>💳 Wallet</h3>
<button onclick="deposit()">+200</button>
<button onclick="withdraw()">-100</button>
</div>
</div>

<!-- NAV -->
<div class="nav">
<button onclick="show('home')">🏠</button>
<button onclick="show('sports')">⚽</button>
<button onclick="show('wallet')">💰</button>
</div>

<audio id="win" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<audio id="lose" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<script>
let coins=1000
let username=""

/* UPDATE */
function update(){
 document.getElementById("coins").innerText=coins
}

/* LOGIN */
function login(){
 username=document.getElementById("user").value
 if(username==""){alert("Enter name");return}
 show('home')
}

/* NAV */
function show(id){
 document.querySelectorAll(".screen").forEach(e=>e.classList.remove("active"))
 document.getElementById(id).classList.add("active")
}

/* SOUND */
let win=document.getElementById("win")
let lose=document.getElementById("lose")

/* SLOT */
function spin(){
 let arr=["🍒","🍋","⭐","💎"]
 let a=arr[Math.floor(Math.random()*4)]
 let b=arr[Math.floor(Math.random()*4)]
 let c=arr[Math.floor(Math.random()*4)]
 alert(a+" "+b+" "+c)
 if(a==b && b==c){coins+=150;win.play()}
 else{coins-=30;lose.play()}
 update()
}

/* DICE */
function dice(){
 let r=Math.random()
 if(r>0.5){coins+=40;win.play()}
 else{coins-=20;lose.play()}
 update()
}

/* FLIP */
function flip(){
 if(Math.random()>0.5){coins+=30;win.play()}
 else{coins-=15;lose.play()}
 update()
}

/* COLOR */
function color(){
 if(Math.random()>0.5){coins+=35;win.play()}
 else{coins-=20;lose.play()}
 update()
}

/* NUMBER */
function number(){
 let n=Math.floor(Math.random()*10)
 alert("Number "+n)
 if(n>5){coins+=40;win.play()}
 else{coins-=20;lose.play()}
 update()
}

/* ROULETTE */
function roulette(){
 let n=Math.floor(Math.random()*36)
 alert("Roulette "+n)
 if(n%2==0){coins+=60;win.play()}
 else{coins-=30;lose.play()}
 update()
}

/* HI-LO */
function hiLo(){
 if(Math.random()>0.5){coins+=40;win.play()}
 else{coins-=20;lose.play()}
 update()
}

/* CRASH */
function crash(){
 let multi=1
 let int=setInterval(()=>{
  multi+=0.1
  if(Math.random()>0.95){
   clearInterval(int)
   if(confirm("Cash at "+multi.toFixed(2)+"?")){
    coins+=Math.floor(multi*80);win.play()
   }else{
    coins-=40;lose.play()
   }
   update()
  }
 },100)
}

/* MINES */
function mine(){
 if(Math.random()>0.7){coins+=100;win.play()}
 else{coins-=50;lose.play()}
 update()
}

/* WHEEL */
function wheel(){
 let n=Math.floor(Math.random()*5)
 alert("Wheel "+n)
 if(n==0){coins+=200;win.play()}
 else{coins-=30;lose.play()}
 update()
}

/* SPORTS */
function bet(t){
 let winTeam=Math.random()>0.5?1:0
 if(t==winTeam){coins+=80;win.play()}
 else{coins-=40;lose.play()}
 update()
}

/* WALLET */
function deposit(){coins+=200;update()}
function withdraw(){coins-=100;update()}

update()
</script>

</body>
</html>
