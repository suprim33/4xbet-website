<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>4X Bet Ultimate</title>

<style>
body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

/* LOGIN */
#login{
text-align:center;
margin-top:120px;
}

input{
padding:10px;
border-radius:10px;
border:none;
}

/* HEADER */
.top{
display:flex;
justify-content:space-between;
padding:15px;
background:black;
box-shadow:0 0 10px cyan;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
padding:20px;
}

/* CARD */
.card{
background:#1e293b;
padding:20px;
border-radius:20px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

/* BTN */
.btn{
padding:10px;
border:none;
border-radius:10px;
background:#00ffcc;
margin:5px;
cursor:pointer;
}

/* SLOT */
.slot{
font-size:40px;
}

/* CRASH */
#multi{
font-size:28px;
color:cyan;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>4X Bet Login</h2>
<input id="username" placeholder="Enter name">
<br><br>
<button class="btn" onclick="start()">Enter</button>
</div>

<!-- MAIN -->
<div id="main" style="display:none">

<div class="top">
<div>👤 <span id="user"></span></div>
<div>💰 <span id="coins">100</span></div>
</div>

<div class="grid">

<div class="card">
<h3>🎰 Slot</h3>
<div id="slot" class="slot">🍒 🍋 🍉</div>
<button class="btn" onclick="slot()">Spin</button>
</div>

<div class="card">
<h3>✈️ Crash</h3>
<div id="multi">1.00x</div>
<button class="btn" onclick="crash()">Start</button>
<button class="btn" onclick="cash()">Cash</button>
</div>

<div class="card">
<h3>🎡 Spin</h3>
<button class="btn" onclick="spin()">Play</button>
</div>

<div class="card">
<h3>🏆 Leaderboard</h3>
<div id="board"></div>
</div>

</div>
</div>

<!-- SOUND -->
<audio id="win" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<audio id="lose" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<script>
let coins=100
let user=""
let run=false
let multi=1
let interval

function start(){
user=document.getElementById("username").value
if(user==""){alert("Enter name");return}

document.getElementById("login").style.display="none"
document.getElementById("main").style.display="block"

document.getElementById("user").innerText=user

let saved=localStorage.getItem(user)
if(saved){coins=parseInt(saved)}

update()
}

/* UPDATE */
function update(){
document.getElementById("coins").innerText=coins
localStorage.setItem(user,coins)
updateBoard()
}

/* SLOT */
function slot(){
let arr=["🍒","🍋","🍉","⭐"]
let a=arr[Math.floor(Math.random()*4)]
let b=arr[Math.floor(Math.random()*4)]
let c=arr[Math.floor(Math.random()*4)]

document.getElementById("slot").innerText=a+" "+b+" "+c

if(a==b && b==c){
coins+=100
win.play()
}else{
coins-=10
lose.play()
}
update()
}

/* SPIN */
function spin(){
if(Math.random()>0.7){
coins+=40
win.play()
}else{
coins-=10
lose.play()
}
update()
}

/* CRASH */
function crash(){
if(run) return
run=true
multi=1

interval=setInterval(()=>{
multi+=0.05
document.getElementById("multi").innerText=multi.toFixed(2)+"x"

if(Math.random()>0.96){
clearInterval(interval)
run=false
alert("💥 Crash at "+multi.toFixed(2))
}
},200)
}

function cash(){
if(!run) return

coins+=Math.floor(multi*25)
win.play()

clearInterval(interval)
run=false
update()
}

/* LEADERBOARD */
function updateBoard(){
let board=document.getElementById("board")
board.innerHTML=""

for(let i=0;i<localStorage.length;i++){
let name=localStorage.key(i)
let score=localStorage.getItem(name)
board.innerHTML+=name+" — "+score+"<br>"
}
}
</script>

</body>
</html>
